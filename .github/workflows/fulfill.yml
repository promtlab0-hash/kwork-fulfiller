name: fulfill

# Запуск вручную из вкладки Actions. Выбираете нишу, вставляете бриф —
# результат прилетает архивом в Artifacts.
on:
  workflow_dispatch:
    inputs:
      niche:
        description: "Профиль (id ниши)"
        required: true
        type: choice
        options:
          - price_list
          - faq_base
          - content_plan
          - email_series
          - objection_bank
          - kp
          - sales_script
          - job_reg
          - tz
          - chatbot_script
      brief:
        description: "Бриф заказчика"
        required: true
        type: string
      settings:
        description: "Переопределение настроек: k=v,k=v (опционально)"
        required: false
        type: string
      backend:
        description: "Бэкенд генерации"
        required: false
        default: openai
        type: choice
        options:
          - openai
          - claude
      model:
        description: "Модель (для openai-бэкенда), напр. qwen/qwen-2.5-72b-instruct:free"
        required: false
        default: "qwen/qwen-2.5-72b-instruct:free"
        type: string
      base_url:
        description: "Endpoint (для openai-бэкенда)"
        required: false
        default: "https://openrouter.ai/api/v1"
        type: string

jobs:
  fulfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI
        if: ${{ inputs.backend == 'claude' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Write brief to file
        run: |
          cat > brief.txt <<'BRIEF_EOF'
          ${{ inputs.brief }}
          BRIEF_EOF

      - name: Build --set args
        id: sets
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          raw = """${{ inputs.settings }}""".strip()
          flags = []
          for pair in (p.strip() for p in raw.split(",")):
              if "=" in pair:
                  flags.append(f"--set {pair}")
          print("args=" + " ".join(flags))
          PY

      - name: Run fulfiller
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_NO_TELEMETRY: "1"
          LLM_BACKEND: ${{ inputs.backend }}
          LLM_MODEL: ${{ inputs.model }}
          LLM_BASE_URL: ${{ inputs.base_url }}
          # Ключ OpenRouter (или иного OpenAI-совместимого провайдера).
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python fulfill.py \
            --niche "${{ inputs.niche }}" \
            --brief brief.txt \
            --out out \
            ${{ steps.sets.outputs.args }}

      - name: Upload deliverables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fulfill-${{ inputs.niche }}
          path: out/
          if-no-files-found: warn
