name: fulfill

# Запуск вручную из вкладки Actions (в т.ч. с телефона). Выбираете нишу,
# вставляете бриф — результат прилетает архивом в Artifacts.
# Бэкенд по умолчанию — КАСКАД провайдеров с авто-переключением при лимите.
on:
  workflow_dispatch:
    inputs:
      niche:
        description: "Профиль (id ниши)"
        required: true
        type: choice
        options:
          - price_list
          - faq_base
          - content_plan
          - email_series
          - objection_bank
          - kp
          - sales_script
          - job_reg
          - tz
          - chatbot_script
      brief:
        description: "Бриф заказчика"
        required: true
        type: string
      settings:
        description: "Переопределение настроек: k=v,k=v (опционально)"
        required: false
        type: string
      chain:
        description: "Каскад провайдеров (пусто = встроенный по умолчанию)"
        required: false
        type: string

# models: read даёт встроенному GITHUB_TOKEN доступ к GitHub Models — генерация
# работает БЕЗ отдельных ключей (в т.ч. при запуске с телефона).
permissions:
  contents: read
  models: read

jobs:
  fulfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Claude Code CLI
        if: ${{ contains(inputs.chain, 'claude') }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Write brief to file
        run: |
          cat > brief.txt <<'BRIEF_EOF'
          ${{ inputs.brief }}
          BRIEF_EOF

      - name: Build --set args
        id: sets
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          raw = """${{ inputs.settings }}""".strip()
          flags = []
          for pair in (p.strip() for p in raw.split(",")):
              if "=" in pair:
                  flags.append(f"--set {pair}")
          print("args=" + " ".join(flags))
          PY

      - name: Run fulfiller
        env:
          # Каскад: пусто -> встроенный default (github→openrouter→…).
          LLM_CHAIN: ${{ inputs.chain }}
          # GitHub Models: бесплатно встроенным токеном (permissions: models: read).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Необязательные доп-провайдеры — линк пропускается, если секрет пуст.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_NO_TELEMETRY: "1"
        run: |
          python fulfill.py \
            --niche "${{ inputs.niche }}" \
            --brief brief.txt \
            --out out \
            ${{ steps.sets.outputs.args }}

      - name: Upload deliverables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fulfill-${{ inputs.niche }}
          path: out/
          if-no-files-found: warn
